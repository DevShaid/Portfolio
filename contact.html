    </nav>
  </div>

  <main class="slides-container">

    <!-- Slide 1: Hero -->
    <section class="slide slide--hero is-active" data-slide="0">
      <div class="slide-inner container">
        <span class="slide-label">Contact</span>
        <h1 class="slide-hero-title">
          <span class="line-wrap"><span class="line">LET'S</span></span>
          <span class="line-wrap"><span class="line">CONNECT</span></span>
        </h1>
        <p class="slide-hero-subtitle">Have a project in mind, a role to discuss, or just want to say hello? I'm always open to new opportunities and conversations.</p>
      </div>
      <div class="slide-scroll-hint">
        <span>Scroll</span>
        <div class="slide-scroll-line"></div>
      </div>
    </section>

    <!-- Slide 2: Contact Form -->
    <section class="slide slide--form" data-slide="1">
      <div class="slide-inner container">
        <span class="slide-section-label">Send a Message</span>
        <form class="contact-form" id="contactForm" action="#" method="POST">
          <div class="form-row">
            <div class="form-group">
              <label for="formName">Name</label>
              <input type="text" id="formName" name="name" placeholder="Your name" required autocomplete="name">
            </div>
            <div class="form-group">
              <label for="formEmail">Email</label>
              <input type="email" id="formEmail" name="email" placeholder="your@email.com" required autocomplete="email">
            </div>
          </div>
          <div class="form-group">
            <label for="formSubject">Subject</label>
            <input type="text" id="formSubject" name="subject" placeholder="What's this about?">
          </div>
          <div class="form-group">
            <label for="formMessage">Message</label>
            <textarea id="formMessage" name="message" placeholder="Tell me about your project or opportunity..." rows="5" required></textarea>
          </div>
          <button type="submit" class="form-submit magnetic-el" data-strength="15">
            <span>Send Message</span>
            <span class="form-submit-arrow">&rarr;</span>
          </button>
        </form>
        <div class="slide-footer">
          <span>&copy; 2026 Shaid Tiwari</span>
        </div>
      </div>
    </section>

  </main>
