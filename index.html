<body data-page="home">

  <!-- Film Grain Overlay -->

  <!-- Custom Cursor -->
  <div class="cursor-dot" id="cursorDot"></div>
  <div class="cursor-outline" id="cursorOutline"></div>

  <!-- Header -->
  <header id="header">
    <nav class="nav-links">
      <a href="index.html" class="nav-link active"><span>Home</span></a>
      <a href="about.html" class="nav-link"><span>About</span></a>

      <a href="contact.html" class="mobile-link">Contact</a>
    </nav>
  </div>

  <main>

    <!-- Hero -->
    <section id="hero" class="section">
      <div class="container hero-container">
        <h1 class="hero-name" aria-label="Shaid Tiwari" id="heroName">
          <span class="line-wrap"><span class="line">SHAID</span></span>
          <span class="line-wrap"><span class="line"><span id="tiwariT">T<img src="CBE_PIC.png" alt="" aria-hidden="true" class="cat-on-t" id="catGif"></span>IWARI</span></span>
        </h1>
        <div class="hero-meta">
          <div class="hero-roles">
            <span>DevOps Engineer</span>
            <span class="separator">&mdash;</span>
            <span>Backend Developer</span>
          </div>
        </div>
      </div>

      <div class="scroll-indicator">
        <div class="scroll-line"></div>
      </div>
    </section>

    <!-- Companies Marquee -->
    <div class="companies-section">
      <div class="marquee-track">
        <div class="marquee-content">
          <span class="company-name">FitMirage</span>
          <span class="company-name">Contra</span>
          <span class="company-name">Omniverse Quant</span>
          <span class="company-name">NexaCloud</span>
          <span class="company-name">Vortex Labs</span>
          <span class="company-name">Synapse AI</span>
          <span class="company-name">Cloudrift</span>
        </div>
        <div class="marquee-content" aria-hidden="true">
          <span class="company-name">FitMirage</span>
          <span class="company-name">Contra</span>
          <span class="company-name">Omniverse Quant</span>
          <span class="company-name">NexaCloud</span>
          <span class="company-name">Vortex Labs</span>
          <span class="company-name">Synapse AI</span>
          <span class="company-name">Cloudrift</span>
        </div>
      </div>
    </div>

    <style>
      .companies-section {
        position: relative;
        overflow: hidden;
      }
      .companies-section::before,
      .companies-section::after {
        pointer-events: none;
      }
      /* glow streak on top border */
      .marquee-track {
        position: relative;
      }
      .marquee-track::before,
      .marquee-track::after {
        content: "";
        position: absolute;
        left: -200px;
        width: 200px;
        height: 3px;
        border-radius: 2px;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), #fff, rgba(255,255,255,0.5), transparent);
        box-shadow: 0 0 8px 3px rgba(255,255,255,0.5), 0 0 20px 6px rgba(255,255,255,0.2);
        animation: glow-race 2.5s linear infinite;
        z-index: 2;
        pointer-events: none;
      }
      .marquee-track::before { top: -1px; }
      .marquee-track::after  { bottom: -1px; animation-delay: -1.25s; }
      @keyframes glow-race {
        0%   { left: -200px; }
        100% { left: 100%; }
      }
    </style>

  </main>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <script src="script.js?v=9"></script>
  <audio id="bg-music" src="bg-music.mp3" loop preload="auto"></audio>
  <script>
    (function(){var a=document.getElementById('bg-music');if(!a)return;a.volume=0.55;var t=sessionStorage.getItem('bgMusicTime');if(t)a.currentTime=parseFloat(t);a.play().catch(function(){});})();
  </script>
